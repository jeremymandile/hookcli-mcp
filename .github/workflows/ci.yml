name: Hook CLI MCP CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint-format
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
      - run: pip install --pre -e ".[dev]"
      - name: Run tests
        # Ignore tests/security — those need real Docker sandbox access (DinD is unreliable in standard runners)
        run: pytest tests/ --asyncio-mode=auto -v --cov=hookcli_mcp --cov-report=xml --ignore=tests/security
        env:
          REDIS_URL: redis://localhost:6379/0
          SLACK_BOT_TOKEN: "fake-token-for-test"
          SLACK_SIGNING_SECRET: "fake-secret-for-test"
      - uses: codecov/codecov-action@v3

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit safety
      - name: SAST Scan
        run: bandit -r hookcli_mcp/ -ll -ii
      - name: Dependency Check
        run: safety check -r pyproject.toml
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true  # SARIF upload requires GitHub Advanced Security; skip gracefully on public/free repos
        with:
          sarif_file: trivy-results.sarif

  build-docker:
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hookcli-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
